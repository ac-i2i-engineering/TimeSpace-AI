name: Lint Code Base

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        pip install pylint pylint-google-style
    - name: Run Pylint
      run: |
        pylint --rcfile=.pylintrc your_module_name/